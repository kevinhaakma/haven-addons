configuration:
  hub_url:
    name: Hub URL
    description: >-
      WebSocket address of the HA Fleet Hub, e.g. wss://fleet.example.com/agent/ws.
      Provided by the hub administrator via the pairing code.
  agent_id:
    name: Agent name
    description: >-
      Unique name of this instance on the hub (e.g. "brother"). Comes from the
      hub administrator's pairing code.
  agent_key:
    name: Agent key
    description: >-
      Secret key belonging to the agent name. Comes from the pairing code; after
      a key rotation on the hub, enter the new key here.
