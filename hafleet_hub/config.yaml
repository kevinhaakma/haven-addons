name: HA Fleet Hub
version: "1.2.1"
slug: hafleet_hub
description: Beheer de Home Assistant-instanties van familie en vrienden vanaf één dashboard
url: https://github.com/kevinhaakma/ha-fleet-addons
arch:
  - amd64
  - aarch64
init: false
host_network: true
map:
  - addon_config:rw
ingress: true
ingress_port: 8099
panel_icon: mdi:home-group
panel_title: HA Fleet
watchdog: http://[HOST]:8099/healthz
options:
  public_hub_url: ""
  poll_interval: 300
schema:
  public_hub_url: str
  poll_interval: int(60,3600)
