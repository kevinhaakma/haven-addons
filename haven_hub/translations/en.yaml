configuration:
  public_hub_url:
    name: Public hub URL
    description: >-
      The public WebSocket address where agents reach this hub, e.g.
      wss://fleet.example.com/agent/ws. Used in the pairing codes generated by
      the UI. May only be left empty if you don't use agent instances.
  poll_interval:
    name: Poll interval (seconds)
    description: >-
      How often the hub checks all instances for status, updates, backups and
      alerts. Default 300 seconds (5 minutes).
